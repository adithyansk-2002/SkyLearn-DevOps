name: Rollback SkyLearn

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag (Commit SHA)"
        required: true
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            cd /home/devopsadmin/SkyLearn-DevOps/docker/compose

            echo "Rolling back to image tag: $IMAGE_TAG"

            IMAGE_TAG=${{ github.event.inputs.image_tag }} docker compose pull

            IMAGE_TAG=${{ github.event.inputs.image_tag }} docker compose up -d --force-recreate

            echo "Waiting for application..."

            sleep 10

            curl -f http://localhost/api/health
