services:

  database:
    image: mariadb:11.4
    container_name: skylearn-db

    restart: unless-stopped

    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: skylearn

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ../../app/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: ghcr.io/adithyansk-2002/skylearn-backend:${IMAGE_TAG:-latest}

    container_name: skylearn-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    depends_on:
      - database

  frontend:
    image: ghcr.io/adithyansk-2002/skylearn-frontend:${IMAGE_TAG:-latest}

    container_name: skylearn-frontend

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - backend
 
  prometheus:
    image: prom/prometheus:v3.5.0

    container_name: prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    depends_on:
      - node-exporter

  node-exporter:
    image: prom/node-exporter:v1.9.1

    container_name: node-exporter

    restart: unless-stopped

    ports:
      - "9100:9100"

    pid: host

    command:
      - "--path.rootfs=/host"

    volumes:
      - "/:/host:ro,rslave"

volumes:
  db_data:
