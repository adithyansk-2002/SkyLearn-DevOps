services:

  database:
    image: mariadb:11.4
    container_name: skylearn-db

    restart: unless-stopped

    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: skylearn

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ../../app/database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    image: ghcr.io/adithyansk-2002/skylearn-backend:${IMAGE_TAG:-latest}

    container_name: skylearn-backend

    restart: unless-stopped

    ports:
      - "5000:5000"

    depends_on:
      - database

  frontend:
    image: ghcr.io/adithyansk-2002/skylearn-frontend:${IMAGE_TAG:-latest}

    container_name: skylearn-frontend

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v3.5.0

    container_name: prometheus

    restart: unless-stopped

    ports:
      - "9090:9090"

    volumes:
      - ../../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../monitoring/prometheus/rules:/etc/prometheus/rules:ro

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    depends_on:
      - node-exporter

  grafana:
    image: grafana/grafana:12.1.1

    container_name: grafana

    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    depends_on:
      - prometheus

    volumes:
      - grafana_data:/var/lib/grafana

      - ../../monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro

      - ../../monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

      - ../../monitoring/grafana/dashboards:/var/lib/grafana/dashboards


  node-exporter:
    image: prom/node-exporter:v1.9.1

    container_name: node-exporter

    restart: unless-stopped

    ports:
      - "9100:9100"

    pid: host

    command:
      - "--path.rootfs=/host"

    volumes:
      - "/:/host:ro,rslave"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1

    container_name: cadvisor

    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

    privileged: true

  alertmanager:
    image: prom/alertmanager:v0.28.1

    container_name: alertmanager

    restart: unless-stopped

    ports:
      - "9093:9093"

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

    volumes:
      - ../../monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  loki:
    image: grafana/loki:3.5.3

    container_name: loki

    restart: unless-stopped

    ports:
      - "3100:3100"

    command:
      - "-config.file=/etc/loki/config.yml"

    volumes:
      - ../../monitoring/loki/config.yml:/etc/loki/config.yml:ro

  promtail:
    image: grafana/promtail:3.5.3

    container_name: promtail

    restart: unless-stopped

    command:
      - "-config.file=/etc/promtail/config.yml"

    depends_on:
      - loki

    volumes:
      - ../../monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

volumes:
  db_data:
  grafana_data:
