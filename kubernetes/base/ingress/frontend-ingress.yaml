apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: skylearn-ingress
  namespace: skylearn

spec:
  ingressClassName: traefik

  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix

            backend:
              service:
                name: frontend
                port:
                  number: 80
