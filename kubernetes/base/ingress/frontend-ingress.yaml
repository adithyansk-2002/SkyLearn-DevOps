apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: skylearn-ingress
  namespace: skylearn
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    traefik.ingress.kubernetes.io/router.middlewares: skylearn-strip-api-prefix@kubernetescrd

spec:
  ingressClassName: traefik

  tls:
    - hosts:
        - skylearn.duckdns.org
      secretName: skylearn-tls

  rules:
    - host: skylearn.duckdns.org
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
