apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: skylearn

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: ghcr.io/adithyansk-2002/skylearn-frontend:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 80
