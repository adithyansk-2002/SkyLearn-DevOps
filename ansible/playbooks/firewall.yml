---
- name: Configure Firewall
  hosts: control
  become: true

  tasks:

    - name: Ensure firewalld is installed
      package:
        name: firewalld
        state: present

    - name: Enable firewalld
      service:
        name: firewalld
        enabled: true

    - name: Start firewalld
      service:
        name: firewalld
        state: started

    - name: Allow HTTP service
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: true
